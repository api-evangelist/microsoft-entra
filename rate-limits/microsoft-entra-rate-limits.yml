    name: Enterprise Negotiated Limit
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - Microsoft Entra ID (Azure AD) API
      - Microsoft Entra ID Protection API
      - Microsoft Entra Conditional Access API
