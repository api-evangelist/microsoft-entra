specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Microsoft Entra
providerId: microsoft-entra
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Access Management
  - Authentication
  - Azure AD
  - Entra
  - Identity
  - Identity Governance
  - Microsoft
  - Network Security
  - Security
  - Zero Trust
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Microsoft Entra API surface. Captures per-tier
  quotas, burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to
  be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - Microsoft Entra ID (Azure AD) API
      - Microsoft Entra ID Protection API
      - Microsoft Entra Conditional Access API
      - Microsoft Entra Privileged Identity Management API
      - Microsoft Entra Verified ID API
      - Microsoft Entra External ID API
      - Microsoft Entra ID Governance API
      - Microsoft Entra Application Management API
      - Microsoft Entra Authentication Methods API
      - Microsoft Entra Workload ID API
      - Microsoft Entra Provisioning API
      - Microsoft Entra Global Secure Access API
      - Microsoft Identity Platform API
      - Microsoft Entra Agent ID API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - Microsoft Entra ID (Azure AD) API
      - Microsoft Entra ID Protection API
      - Microsoft Entra Conditional Access API
      - Microsoft Entra Privileged Identity Management API
      - Microsoft Entra Verified ID API
      - Microsoft Entra External ID API
      - Microsoft Entra ID Governance API
      - Microsoft Entra Application Management API
      - Microsoft Entra Authentication Methods API
      - Microsoft Entra Workload ID API
      - Microsoft Entra Provisioning API
      - Microsoft Entra Global Secure Access API
      - Microsoft Identity Platform API
      - Microsoft Entra Agent ID API
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - Microsoft Entra ID (Azure AD) API
      - Microsoft Entra ID Protection API
      - Microsoft Entra Conditional Access API
      - Microsoft Entra Privileged Identity Management API
      - Microsoft Entra Verified ID API
      - Microsoft Entra External ID API
      - Microsoft Entra ID Governance API
      - Microsoft Entra Application Management API
      - Microsoft Entra Authentication Methods API
      - Microsoft Entra Workload ID API
      - Microsoft Entra Provisioning API
      - Microsoft Entra Global Secure Access API
      - Microsoft Identity Platform API
      - Microsoft Entra Agent ID API
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - Microsoft Entra ID (Azure AD) API
      - Microsoft Entra ID Protection API
      - Microsoft Entra Conditional Access API
      - Microsoft Entra Privileged Identity Management API
      - Microsoft Entra Verified ID API
      - Microsoft Entra External ID API
      - Microsoft Entra ID Governance API
      - Microsoft Entra Application Management API
