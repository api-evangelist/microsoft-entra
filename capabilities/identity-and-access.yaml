naftiko: 1.0.0-alpha2
info:
  label: Microsoft Entra Identity and Access Management
  description: Unified workflow for managing identity and access including users, groups, applications, and service principals
    in Microsoft Entra ID. Used by IT administrators and identity engineers.
  tags:
  - Microsoft Entra
  - Identity
  - Access Management
  - Directory Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MICROSOFT_ENTRA_ACCESS_TOKEN: MICROSOFT_ENTRA_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: entra-graph
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Identity and Access Management API.
    authentication:
      type: bearer
      token: '{{MICROSOFT_ENTRA_ACCESS_TOKEN}}'
    resources:
    - name: users
      path: /users
      description: User account management.
      operations:
      - name: list-users
        method: GET
        description: List all users in the directory.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to include in response.
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression.
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-user
        method: POST
        description: Create a new user in the directory.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
            accountEnabled: '{{tools.accountEnabled}}'
            mailNickname: '{{tools.mailNickname}}'
            userPrincipalName: '{{tools.userPrincipalName}}'
    - name: user-details
      path: /users/{user-id}
      description: Individual user management.
      operations:
      - name: get-user
        method: GET
        description: Get user properties and relationships.
        inputParameters:
        - name: user-id
          in: path
          type: string
          required: true
          description: User ID or userPrincipalName.
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-user
        method: PATCH
        description: Update user properties.
        inputParameters:
        - name: user-id
          in: path
          type: string
          required: true
          description: User ID or userPrincipalName.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
      - name: delete-user
        method: DELETE
        description: Delete a user from the directory.
        inputParameters:
        - name: user-id
          in: path
          type: string
          required: true
          description: User ID or userPrincipalName.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-memberships
      path: /users/{user-id}/memberOf
      description: User group membership management.
      operations:
      - name: list-user-memberships
        method: GET
        description: List groups and roles the user is a member of.
        inputParameters:
        - name: user-id
          in: path
          type: string
          required: true
          description: User ID or userPrincipalName.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups
      path: /groups
      description: Group management.
      operations:
      - name: list-groups
        method: GET
        description: List all groups in the directory.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to include.
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression.
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-group
        method: POST
        description: Create a new group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
            mailEnabled: '{{tools.mailEnabled}}'
            mailNickname: '{{tools.mailNickname}}'
            securityEnabled: '{{tools.securityEnabled}}'
    - name: group-details
      path: /groups/{group-id}
      description: Individual group management.
      operations:
      - name: get-group
        method: GET
        description: Get group properties.
        inputParameters:
        - name: group-id
          in: path
          type: string
          required: true
          description: Group ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-group
        method: PATCH
        description: Update group properties.
        inputParameters:
        - name: group-id
          in: path
          type: string
          required: true
          description: Group ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
      - name: delete-group
        method: DELETE
        description: Delete a group.
        inputParameters:
        - name: group-id
          in: path
          type: string
          required: true
          description: Group ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: group-members
      path: /groups/{group-id}/members
      description: Group membership management.
      operations:
      - name: list-group-members
        method: GET
        description: List members of a group.
        inputParameters:
        - name: group-id
          in: path
          type: string
          required: true
          description: Group ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: add-group-member
        method: POST
        description: Add a member to a group.
        inputParameters:
        - name: group-id
          in: path
          type: string
          required: true
          description: Group ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            '@odata.id': '{{tools.memberRef}}'
    - name: group-member-details
      path: /groups/{group-id}/members/{member-id}/$ref
      description: Individual group member management.
      operations:
      - name: remove-group-member
        method: DELETE
        description: Remove a member from a group.
        inputParameters:
        - name: group-id
          in: path
          type: string
          required: true
          description: Group ID.
        - name: member-id
          in: path
          type: string
          required: true
          description: Member ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications
      path: /applications
      description: Application registration management.
      operations:
      - name: list-applications
        method: GET
        description: List all application registrations.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to include.
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-application
        method: POST
        description: Register a new application.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
    - name: application-details
      path: /applications/{application-id}
      description: Individual application management.
      operations:
      - name: get-application
        method: GET
        description: Get application properties.
        inputParameters:
        - name: application-id
          in: path
          type: string
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-application
        method: PATCH
        description: Update application properties.
        inputParameters:
        - name: application-id
          in: path
          type: string
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
      - name: delete-application
        method: DELETE
        description: Delete an application registration.
        inputParameters:
        - name: application-id
          in: path
          type: string
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: service-principals
      path: /servicePrincipals
      description: Service principal management.
      operations:
      - name: list-service-principals
        method: GET
        description: List all service principals.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to include.
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-service-principal
        method: POST
        description: Create a new service principal.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            appId: '{{tools.appId}}'
    - name: service-principal-details
      path: /servicePrincipals/{service-principal-id}
      description: Individual service principal management.
      operations:
      - name: get-service-principal
        method: GET
        description: Get service principal properties.
        inputParameters:
        - name: service-principal-id
          in: path
          type: string
          required: true
          description: Service principal ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-service-principal
        method: PATCH
        description: Update service principal properties.
        inputParameters:
        - name: service-principal-id
          in: path
          type: string
          required: true
          description: Service principal ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            displayName: '{{tools.displayName}}'
      - name: delete-service-principal
        method: DELETE
        description: Delete a service principal.
        inputParameters:
        - name: service-principal-id
          in: path
          type: string
          required: true
          description: Service principal ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
