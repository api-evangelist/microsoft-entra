naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Entra Identity and Access Management"
  description: "Unified workflow for managing identity and access including users, groups, applications, and service principals in Microsoft Entra ID. Used by IT administrators and identity engineers."
  tags:
    - Microsoft Entra
    - Identity
    - Access Management
    - Directory Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MICROSOFT_ENTRA_ACCESS_TOKEN: MICROSOFT_ENTRA_ACCESS_TOKEN

capability:
  consumes:
    - import: entra-graph
      location: ./shared/graph-identity.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: entra-iam-api
      description: "Unified REST API for Microsoft Entra identity and access management."
      resources:
        - path: /v1/users
          name: users
          description: "User account management."
          operations:
            - method: GET
              name: list-users
              description: "List all users in the directory."
              call: "entra-graph.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: "Create a new user."
              call: "entra-graph.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}
          name: user-details
          description: "Individual user management."
          operations:
            - method: GET
              name: get-user
              description: "Get user details."
              call: "entra-graph.get-user"
              with:
                user-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-user
              description: "Update user properties."
              call: "entra-graph.update-user"
              with:
                user-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-user
              description: "Delete a user."
              call: "entra-graph.delete-user"
              with:
                user-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/memberships
          name: user-memberships
          description: "User group membership."
          operations:
            - method: GET
              name: list-user-memberships
              description: "List user group memberships."
              call: "entra-graph.list-user-memberships"
              with:
                user-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups
          name: groups
          description: "Group management."
          operations:
            - method: GET
              name: list-groups
              description: "List all groups."
              call: "entra-graph.list-groups"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-group
              description: "Create a new group."
              call: "entra-graph.create-group"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups/{id}
          name: group-details
          description: "Individual group management."
          operations:
            - method: GET
              name: get-group
              description: "Get group details."
              call: "entra-graph.get-group"
              with:
                group-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-group
              description: "Update group properties."
              call: "entra-graph.update-group"
              with:
                group-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-group
              description: "Delete a group."
              call: "entra-graph.delete-group"
              with:
                group-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups/{id}/members
          name: group-members
          description: "Group membership management."
          operations:
            - method: GET
              name: list-group-members
              description: "List group members."
              call: "entra-graph.list-group-members"
              with:
                group-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: add-group-member
              description: "Add a member to a group."
              call: "entra-graph.add-group-member"
              with:
                group-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications
          name: applications
          description: "Application registration management."
          operations:
            - method: GET
              name: list-applications
              description: "List all applications."
              call: "entra-graph.list-applications"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-application
              description: "Register a new application."
              call: "entra-graph.create-application"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications/{id}
          name: application-details
          description: "Individual application management."
          operations:
            - method: GET
              name: get-application
              description: "Get application details."
              call: "entra-graph.get-application"
              with:
                application-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-application
              description: "Update application properties."
              call: "entra-graph.update-application"
              with:
                application-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-application
              description: "Delete an application."
              call: "entra-graph.delete-application"
              with:
                application-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-principals
          name: service-principals
          description: "Service principal management."
          operations:
            - method: GET
              name: list-service-principals
              description: "List all service principals."
              call: "entra-graph.list-service-principals"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-service-principal
              description: "Create a new service principal."
              call: "entra-graph.create-service-principal"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-principals/{id}
          name: service-principal-details
          description: "Individual service principal management."
          operations:
            - method: GET
              name: get-service-principal
              description: "Get service principal details."
              call: "entra-graph.get-service-principal"
              with:
                service-principal-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-service-principal
              description: "Update service principal."
              call: "entra-graph.update-service-principal"
              with:
                service-principal-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-service-principal
              description: "Delete a service principal."
              call: "entra-graph.delete-service-principal"
              with:
                service-principal-id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9080
      namespace: entra-iam-mcp
      transport: http
      description: "MCP server for AI-assisted Microsoft Entra identity and access management."
      tools:
        - name: list-users
          description: "List all users in Microsoft Entra directory."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Create a new user in the directory."
          hints:
            readOnly: false
          call: "entra-graph.create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: "Get user properties by ID."
          hints:
            readOnly: true
          call: "entra-graph.get-user"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-user
          description: "Update user properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-user"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-user
          description: "Delete a user from the directory."
          hints:
            destructive: true
            idempotent: true
          call: "entra-graph.delete-user"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-user-memberships
          description: "List groups and roles a user belongs to."
          hints:
            readOnly: true
          call: "entra-graph.list-user-memberships"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List all groups in the directory."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-group
          description: "Create a new group."
          hints:
            readOnly: false
          call: "entra-graph.create-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-group
          description: "Get group details."
          hints:
            readOnly: true
          call: "entra-graph.get-group"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-group
          description: "Update group properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-group"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-group
          description: "Delete a group."
          hints:
            destructive: true
            idempotent: true
          call: "entra-graph.delete-group"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-group-members
          description: "List members of a group."
          hints:
            readOnly: true
          call: "entra-graph.list-group-members"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-group-member
          description: "Add a member to a group."
          hints:
            readOnly: false
          call: "entra-graph.add-group-member"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-group-member
          description: "Remove a member from a group."
          hints:
            destructive: true
            idempotent: true
          call: "entra-graph.remove-group-member"
          with:
            group-id: "tools.groupId"
            member-id: "tools.memberId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-applications
          description: "List all application registrations."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-application
          description: "Register a new application."
          hints:
            readOnly: false
          call: "entra-graph.create-application"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application
          description: "Get application details."
          hints:
            readOnly: true
          call: "entra-graph.get-application"
          with:
            application-id: "tools.applicationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-application
          description: "Update application properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-application"
          with:
            application-id: "tools.applicationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-application
          description: "Delete an application registration."
          hints:
            destructive: true
            idempotent: true
          call: "entra-graph.delete-application"
          with:
            application-id: "tools.applicationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-principals
          description: "List all service principals."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-service-principals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service-principal
          description: "Create a new service principal."
          hints:
            readOnly: false
          call: "entra-graph.create-service-principal"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service-principal
          description: "Get service principal details."
          hints:
            readOnly: true
          call: "entra-graph.get-service-principal"
          with:
            service-principal-id: "tools.servicePrincipalId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-service-principal
          description: "Update service principal properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-service-principal"
          with:
            service-principal-id: "tools.servicePrincipalId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-service-principal
          description: "Delete a service principal."
          hints:
            destructive: true
            idempotent: true
          call: "entra-graph.delete-service-principal"
          with:
            service-principal-id: "tools.servicePrincipalId"
          outputParameters:
            - type: object
              mapping: "$."
