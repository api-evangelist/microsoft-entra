naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Entra Graph Identity API"
  description: "Microsoft Graph Identity API for managing users, groups, applications, and service principals in Microsoft Entra ID."
  tags:
    - Microsoft Entra
    - Identity
    - Access Management
    - Directory
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MICROSOFT_ENTRA_ACCESS_TOKEN: MICROSOFT_ENTRA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: entra-graph
      baseUri: https://graph.microsoft.com/v1.0
      description: "Microsoft Graph Identity and Access Management API."
      authentication:
        type: bearer
        token: "{{MICROSOFT_ENTRA_ACCESS_TOKEN}}"
      resources:
        - name: users
          path: /users
          description: "User account management."
          operations:
            - name: list-users
              method: GET
              description: "List all users in the directory."
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to include in response."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a new user in the directory."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
                  accountEnabled: "{{tools.accountEnabled}}"
                  mailNickname: "{{tools.mailNickname}}"
                  userPrincipalName: "{{tools.userPrincipalName}}"
        - name: user-details
          path: /users/{user-id}
          description: "Individual user management."
          operations:
            - name: get-user
              method: GET
              description: "Get user properties and relationships."
              inputParameters:
                - name: user-id
                  in: path
                  type: string
                  required: true
                  description: "User ID or userPrincipalName."
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to include."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PATCH
              description: "Update user properties."
              inputParameters:
                - name: user-id
                  in: path
                  type: string
                  required: true
                  description: "User ID or userPrincipalName."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
            - name: delete-user
              method: DELETE
              description: "Delete a user from the directory."
              inputParameters:
                - name: user-id
                  in: path
                  type: string
                  required: true
                  description: "User ID or userPrincipalName."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-memberships
          path: /users/{user-id}/memberOf
          description: "User group membership management."
          operations:
            - name: list-user-memberships
              method: GET
              description: "List groups and roles the user is a member of."
              inputParameters:
                - name: user-id
                  in: path
                  type: string
                  required: true
                  description: "User ID or userPrincipalName."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /groups
          description: "Group management."
          operations:
            - name: list-groups
              method: GET
              description: "List all groups in the directory."
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to include."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: "Create a new group."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
                  mailEnabled: "{{tools.mailEnabled}}"
                  mailNickname: "{{tools.mailNickname}}"
                  securityEnabled: "{{tools.securityEnabled}}"
        - name: group-details
          path: /groups/{group-id}
          description: "Individual group management."
          operations:
            - name: get-group
              method: GET
              description: "Get group properties."
              inputParameters:
                - name: group-id
                  in: path
                  type: string
                  required: true
                  description: "Group ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-group
              method: PATCH
              description: "Update group properties."
              inputParameters:
                - name: group-id
                  in: path
                  type: string
                  required: true
                  description: "Group ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
            - name: delete-group
              method: DELETE
              description: "Delete a group."
              inputParameters:
                - name: group-id
                  in: path
                  type: string
                  required: true
                  description: "Group ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: group-members
          path: /groups/{group-id}/members
          description: "Group membership management."
          operations:
            - name: list-group-members
              method: GET
              description: "List members of a group."
              inputParameters:
                - name: group-id
                  in: path
                  type: string
                  required: true
                  description: "Group ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-group-member
              method: POST
              description: "Add a member to a group."
              inputParameters:
                - name: group-id
                  in: path
                  type: string
                  required: true
                  description: "Group ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@odata.id": "{{tools.memberRef}}"
        - name: group-member-details
          path: /groups/{group-id}/members/{member-id}/$ref
          description: "Individual group member management."
          operations:
            - name: remove-group-member
              method: DELETE
              description: "Remove a member from a group."
              inputParameters:
                - name: group-id
                  in: path
                  type: string
                  required: true
                  description: "Group ID."
                - name: member-id
                  in: path
                  type: string
                  required: true
                  description: "Member ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: applications
          path: /applications
          description: "Application registration management."
          operations:
            - name: list-applications
              method: GET
              description: "List all application registrations."
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to include."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-application
              method: POST
              description: "Register a new application."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
        - name: application-details
          path: /applications/{application-id}
          description: "Individual application management."
          operations:
            - name: get-application
              method: GET
              description: "Get application properties."
              inputParameters:
                - name: application-id
                  in: path
                  type: string
                  required: true
                  description: "Application ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-application
              method: PATCH
              description: "Update application properties."
              inputParameters:
                - name: application-id
                  in: path
                  type: string
                  required: true
                  description: "Application ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
            - name: delete-application
              method: DELETE
              description: "Delete an application registration."
              inputParameters:
                - name: application-id
                  in: path
                  type: string
                  required: true
                  description: "Application ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: service-principals
          path: /servicePrincipals
          description: "Service principal management."
          operations:
            - name: list-service-principals
              method: GET
              description: "List all service principals."
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to include."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service-principal
              method: POST
              description: "Create a new service principal."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  appId: "{{tools.appId}}"
        - name: service-principal-details
          path: /servicePrincipals/{service-principal-id}
          description: "Individual service principal management."
          operations:
            - name: get-service-principal
              method: GET
              description: "Get service principal properties."
              inputParameters:
                - name: service-principal-id
                  in: path
                  type: string
                  required: true
                  description: "Service principal ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-service-principal
              method: PATCH
              description: "Update service principal properties."
              inputParameters:
                - name: service-principal-id
                  in: path
                  type: string
                  required: true
                  description: "Service principal ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
            - name: delete-service-principal
              method: DELETE
              description: "Delete a service principal."
              inputParameters:
                - name: service-principal-id
                  in: path
                  type: string
                  required: true
                  description: "Service principal ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: entra-graph-api
      resources:
        - path: /v1/users
          name: users
          description: "User management."
          operations:
            - method: GET
              name: list-users
              description: "List all users."
              call: "entra-graph.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: "Create a new user."
              call: "entra-graph.create-user"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: entra-graph-mcp
      transport: http
      tools:
        - name: list-users
          description: "List all users in Microsoft Entra directory."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Create a new user in the directory."
          hints:
            readOnly: false
          call: "entra-graph.create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: "Get user properties by ID."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.get-user"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-user
          description: "Update user properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-user"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-user
          description: "Delete a user from the directory."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "entra-graph.delete-user"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-user-memberships
          description: "List groups and roles a user is a member of."
          hints:
            readOnly: true
          call: "entra-graph.list-user-memberships"
          with:
            user-id: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List all groups in the directory."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-group
          description: "Create a new group."
          hints:
            readOnly: false
          call: "entra-graph.create-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-group
          description: "Get group properties."
          hints:
            readOnly: true
          call: "entra-graph.get-group"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-group
          description: "Update group properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-group"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-group
          description: "Delete a group."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "entra-graph.delete-group"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-group-members
          description: "List members of a group."
          hints:
            readOnly: true
          call: "entra-graph.list-group-members"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-group-member
          description: "Add a member to a group."
          hints:
            readOnly: false
          call: "entra-graph.add-group-member"
          with:
            group-id: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-group-member
          description: "Remove a member from a group."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "entra-graph.remove-group-member"
          with:
            group-id: "tools.groupId"
            member-id: "tools.memberId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-applications
          description: "List all application registrations."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-application
          description: "Register a new application."
          hints:
            readOnly: false
          call: "entra-graph.create-application"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application
          description: "Get application properties."
          hints:
            readOnly: true
          call: "entra-graph.get-application"
          with:
            application-id: "tools.applicationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-application
          description: "Update application properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-application"
          with:
            application-id: "tools.applicationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-application
          description: "Delete an application registration."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "entra-graph.delete-application"
          with:
            application-id: "tools.applicationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-principals
          description: "List all service principals."
          hints:
            readOnly: true
            openWorld: true
          call: "entra-graph.list-service-principals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service-principal
          description: "Create a new service principal."
          hints:
            readOnly: false
          call: "entra-graph.create-service-principal"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service-principal
          description: "Get service principal properties."
          hints:
            readOnly: true
          call: "entra-graph.get-service-principal"
          with:
            service-principal-id: "tools.servicePrincipalId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-service-principal
          description: "Update service principal properties."
          hints:
            readOnly: false
            idempotent: true
          call: "entra-graph.update-service-principal"
          with:
            service-principal-id: "tools.servicePrincipalId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-service-principal
          description: "Delete a service principal."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "entra-graph.delete-service-principal"
          with:
            service-principal-id: "tools.servicePrincipalId"
          outputParameters:
            - type: object
              mapping: "$."
