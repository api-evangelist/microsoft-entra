name: Microsoft Entra
description: Microsoft Entra (formerly Azure Active Directory) provides identity
  and access management services including authentication, authorization, and 
  directory services.
url: https://learn.microsoft.com/en-us/entra/
image: 
  https://www.microsoft.com/en-us/security/content/dam/microsoft/final/security/includes/microsoft-entra-logo.svg
created: '2024'
modified: '2026-03-16'
specificationVersion: '0.18'
